---
# Service account usado pelo paperclip-app pra rodar kubectl de dentro do pod
# (ex: agente Claude provisiona stack auxiliar de cada projeto via kubectl apply).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: paperclip-agent
  namespace: paperclip
---
# Role no namespace `paperclip`: agente pode gerenciar workloads do proprio
# Paperclip se precisar (ex: aplicar migrations, criar configmaps).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: paperclip-agent-self
  namespace: paperclip
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - pods/exec
      - configmaps
      - services
      - persistentvolumeclaims
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: paperclip-agent-self
  namespace: paperclip
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: paperclip-agent-self
subjects:
  - kind: ServiceAccount
    name: paperclip-agent
    namespace: paperclip
---
# ClusterRole pra agente provisionar projetos novos: criar namespaces filtrados
# por label `paperclip.io/managed=true` e gerenciar todos os workloads dentro.
# Limites: NAO pode mexer em namespaces sem essa label, NAO pode editar RBAC,
# NAO pode acessar nodes/secrets do kube-system, NAO pode criar ClusterRole.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: paperclip-projects-manager
rules:
  # Criar/listar namespaces (escopo ficam todos, mas agente coloca label "managed")
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Workloads dentro dos namespaces de projeto
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - pods/exec
      - services
      - configmaps
      - secrets
      - persistentvolumeclaims
      - serviceaccounts
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets", "daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies", "ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: paperclip-projects-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: paperclip-projects-manager
subjects:
  - kind: ServiceAccount
    name: paperclip-agent
    namespace: paperclip
