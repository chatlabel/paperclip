---
apiVersion: v1
kind: Service
metadata:
  name: paperclip
  namespace: paperclip
  labels:
    app: paperclip
spec:
  selector:
    app: paperclip
  ports:
    - name: http
      port: 80
      targetPort: 3100
  type: ClusterIP
---
# PVC para /paperclip (HOME do user node) — guarda config, sessoes resumiveis,
# logs de heartbeat, agent state, etc. Equivalente ao volume `paperclip-data`
# que usavamos no docker-compose.standalone.yml.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperclip-home
  namespace: paperclip
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 30Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperclip
  namespace: paperclip
  labels:
    app: paperclip
spec:
  replicas: 1
  strategy:
    # State em PVC RWO + processo unico segurando heartbeat sessions = nunca duas instancias.
    type: Recreate
  selector:
    matchLabels:
      app: paperclip
  template:
    metadata:
      labels:
        app: paperclip
    spec:
      serviceAccountName: paperclip-agent
      nodeSelector:
        workload: paperclip
      tolerations:
        - key: paperclip-only
          operator: Equal
          value: "true"
          effect: NoSchedule
      # InitContainer copia kubectl pre-built de alpine/k8s pra emptyDir compartilhado.
      # Decisao: NAO bake kubectl na imagem upstream — mantem fork limpo, versao kubectl
      # eh apenas uma string aqui no manifest. Imagem alpine/k8s carrega kubectl pronto,
      # entao o init nao depende de rede (apk add foi a fonte de falhas de bootstrap).
      initContainers:
        - name: install-kubectl
          image: alpine/k8s:1.31.4
          command:
            - sh
            - -c
            - |
              set -e
              cp /usr/bin/kubectl /shared/kubectl
              /shared/kubectl version --client=true
          volumeMounts:
            - name: shared-bin
              mountPath: /shared
      containers:
        - name: paperclip
          # Pin imutavel pelo digest. latest @ 2026-04-30 (sha256:2862f13c...).
          # Pra atualizar: pegar novo digest com `crane digest ghcr.io/paperclipai/paperclip:latest`
          # ou via curl no manifests endpoint, abrir PR substituindo aqui. ArgoCD aplica.
          image: ghcr.io/paperclipai/paperclip@sha256:2862f13cb20c3e96c27d8dcad366b7aecd8670296a0e939262bd16688d8584e8
          imagePullPolicy: IfNotPresent
          # Wrapper de boot:
          # 1. DooD — adiciona `node` (uid 1000) ao group `docker` (GID 988 do
          #    host) antes do gosu, pra socket /var/run/docker.sock ficar
          #    acessivel ao app (gosu reseta supplementary groups).
          # 2. Git auth — se GH_TOKEN env var existir (vindo do Secret
          #    paperclip-git), cria ~/.netrc com perms 600 pra `git clone`
          #    em repos privados funcionar via HTTPS. Suporta multiplos repos
          #    sob mesma org/usuario com 1 PAT fine-grained (D-13).
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              if ! getent group docker >/dev/null; then
                groupadd -g 988 docker
              fi
              usermod -aG docker node

              if [ -n "${GH_TOKEN:-}" ]; then
                umask 077
                printf 'machine github.com\nlogin x-access-token\npassword %s\n' "$GH_TOKEN" > /paperclip/.netrc
                chown node:node /paperclip/.netrc
                chmod 600 /paperclip/.netrc
                echo "[boot] /paperclip/.netrc configurado (github.com)"
              else
                echo "[boot] GH_TOKEN nao setado; .netrc nao foi escrito"
              fi

              exec docker-entrypoint.sh node --import ./server/node_modules/tsx/dist/loader.mjs server/dist/index.js
          ports:
            - name: http
              containerPort: 3100
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3100"
            - name: SERVE_UI
              value: "true"
            - name: PAPERCLIP_HOME
              value: /paperclip
            - name: PAPERCLIP_DEPLOYMENT_MODE
              value: authenticated
            - name: PAPERCLIP_DEPLOYMENT_EXPOSURE
              value: private
            - name: PAPERCLIP_PUBLIC_URL
              value: https://paperclip.dnshub.space
            - name: PAPERCLIP_DB_MODE
              value: postgres
            - name: DATABASE_URL
              value: postgres://paperclip:$(POSTGRES_PASSWORD)@paperclip-postgres:5432/paperclip
            - name: PATH
              value: /shared:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          envFrom:
            - secretRef:
                name: paperclip-secrets
            # Secret separado, gerenciado fora do Sealed (criado manualmente
            # pelo operador via kubectl create secret) com chave GH_TOKEN.
            # `optional: true` pra deployment subir mesmo sem o secret existir
            # ainda (boot wrapper detecta a ausencia e segue).
            - secretRef:
                name: paperclip-git
                optional: true
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: 4000m
              memory: 8Gi
          # Probes precisam mandar Host header batendo com PAPERCLIP_PUBLIC_URL
          # porque o app em modo authenticated rejeita requests fora de
          # trustedOrigins (kubelet probe usa pod IP por default, vira 403).
          startupProbe:
            httpGet:
              path: /api/health
              port: http
              httpHeaders:
                - name: Host
                  value: paperclip.dnshub.space
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
              httpHeaders:
                - name: Host
                  value: paperclip.dnshub.space
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
              httpHeaders:
                - name: Host
                  value: paperclip.dnshub.space
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: home
              mountPath: /paperclip
            - name: shared-bin
              mountPath: /shared
            # Socket Docker do nó dedicado (DooD). Permite ao agente subir
            # stacks via `docker compose` no host. Pod já está pinado em
            # `k3s-paperclip-01` por nodeSelector + taint, e esse é o unico
            # nó com docker engine instalado.
            - name: docker-socket
              mountPath: /var/run/docker.sock
            # CLI do Docker e plugin compose vindos do host. Imagem upstream
            # do paperclip nao traz docker-cli; em vez de fazer apt install no
            # boot ou manter overlay-image, mount os binarios do host:
            # - /usr/bin/docker depende so de libc.so.6 + loader (presente em
            #   qualquer Linux glibc moderno; container e debian trixie-slim).
            # - cli-plugins/docker-compose e docker-buildx sao binarios Go
            #   estaticos (zero deps externas).
            - name: docker-cli
              mountPath: /usr/local/bin/docker
              readOnly: true
            - name: docker-cli-plugins
              mountPath: /usr/local/libexec/docker/cli-plugins
              readOnly: true
            # Helpers de gerenciamento de stack por task (setup/cleanup).
            # Conteudo vem do ConfigMap gerado por kustomize a partir de
            # scripts/projects/. ReadOnly. Modo 0755 garante exec bit.
            - name: project-helpers
              mountPath: /app/scripts/projects
              readOnly: true
      volumes:
        - name: home
          persistentVolumeClaim:
            claimName: paperclip-home
        - name: shared-bin
          emptyDir: {}
        - name: docker-socket
          hostPath:
            path: /var/run/docker.sock
            type: Socket
        - name: docker-cli
          hostPath:
            path: /usr/bin/docker
            type: File
        - name: docker-cli-plugins
          hostPath:
            path: /usr/libexec/docker/cli-plugins
            type: Directory
        - name: project-helpers
          configMap:
            name: project-helpers
            defaultMode: 0755
