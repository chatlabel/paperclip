apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: paperclip
  namespace: paperclip
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - paperclip.dnshub.space
      secretName: paperclip-tls
  rules:
    - host: paperclip.dnshub.space
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: paperclip
                port:
                  name: http
