---
apiVersion: v1
kind: Service
metadata:
  name: paperclip-postgres
  namespace: paperclip
  labels:
    app: paperclip-postgres
spec:
  selector:
    app: paperclip-postgres
  clusterIP: None
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: paperclip-postgres
  namespace: paperclip
  labels:
    app: paperclip-postgres
spec:
  serviceName: paperclip-postgres
  replicas: 1
  selector:
    matchLabels:
      app: paperclip-postgres
  template:
    metadata:
      labels:
        app: paperclip-postgres
    spec:
      nodeSelector:
        workload: paperclip
      tolerations:
        - key: paperclip-only
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: paperclip
            - name: POSTGRES_DB
              value: paperclip
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: paperclip-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "paperclip", "-d", "paperclip"]
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "paperclip", "-d", "paperclip"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 20Gi
